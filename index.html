<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кто Пойдет?</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; user-select: none; }
        body { background-color: #121212; color: #ffffff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        header { padding: 15px; font-size: 20px; font-weight: bold; color: #ff9f43; text-align: center; width: 100%; border-bottom: 1px solid #222; background: #121212; z-index: 10; }
        
        /* Базовый класс для всех экранов (листов) */
        .screen { display: none; flex-direction: column; justify-content: center; align-items: center; flex-grow: 1; width: 100%; padding: 20px; text-align: center; box-sizing: border-box; }
        
        /* Экран загрузки */
        #screen-loading { font-size: 18px; color: #888; }
        .spinner { border: 4px solid rgba(255,159,67,0.1); border-left-color: #ff9f43; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Экран регистрации */
        input { width: 100%; max-width: 300px; padding: 15px; background: #222; border: 1px solid #444; border-radius: 10px; color: white; font-size: 16px; margin: 20px 0; outline: none; text-align: center; }
        .btn-main { background: #ff9f43; color: white; padding: 15px 40px; border-radius: 10px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; transition: transform 0.1s; }
        .btn-main:active { transform: scale(0.95); }

        /* Экран ленты */
        #screen-feed { justify-content: space-between; padding: 10px 0 30px 0; }
        .card-container { position: relative; flex-grow: 1; width: 90%; max-width: 360px; margin: 10px 0; display: flex; justify-content: center; align-items: center; }
        .card { position: absolute; width: 100%; height: 100%; background: #1e1e1e; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.5); display: flex; flex-direction: column; justify-content: flex-end; transition: transform 0.3s ease, opacity 0.3s ease; border: 1px solid #333; }
        .card-avatar { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; z-index: 1; }
        .card-info { position: relative; z-index: 2; padding: 20px; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 70%, transparent 100%); text-align: left; }
        .user-name { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .user-distance { font-size: 14px; color: #10ac84; font-weight: 600; margin-bottom: 10px; }
        .user-alcohol { background: rgba(255, 159, 67, 0.2); border: 1px solid #ff9f43; color: #ff9f43; padding: 8px 12px; border-radius: 10px; display: inline-block; font-size: 14px; font-weight: bold; }
        
        .buttons-container { width: 100%; max-width: 360px; display: flex; justify-content: space-around; z-index: 10; }
        .btn-action { width: 70px; height: 70px; border-radius: 50%; border: none; font-size: 28px; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: transform 0.1s ease; }
        .btn-action:active { transform: scale(0.9); }
        .btn-pass { background-color: #2d3436; color: #ff6b6b; border: 1px solid #444; }
        .btn-toast { background-color: #ff9f43; color: #fff; }

        /* Экран "Никого нет" */
        #screen-empty p { font-size: 18px; color: #888; margin-bottom: 25px; line-height: 1.5; }
    </style>
</head>
<body>

    <header>🍻 КтоПойдет</header>

    <div id="screen-loading" class="screen" style="display: flex;">
        <div class="spinner"></div>
        <p id="loading-text">Ищем твой радар... 🧭</p>
    </div>

    <div id="screen-setup" class="screen">
        <h2>Что у тебя с собой? 🍾</h2>
        <p style="color: #888; margin-top: 5px; font-size: 14px;">Введи свой арсенал, чтобы тебя увидели на карте района</p>
        <input type="text" id="alcoholInput" placeholder="Например: 0.7 Jack Daniels, пиво, вино">
        <button class="btn-main" onclick="saveProfile()">Погнали</button>
    </div>

    <div id="screen-feed" class="screen">
        <div class="card-container" id="cardContainer">
            </div>
        <div class="buttons-container">
            <button class="btn-action btn-pass" onclick="swipe('pass')">❌</button>
            <button class="btn-action btn-toast" onclick="swipe('toast')">🍻</button>
        </div>
    </div>

    <div id="screen-empty" class="screen">
        <p>Пока никого нет рядом... 🫙<br>Позови друзей в бота, чтобы собраться вместе!</p>
        <button class="btn-main" onclick="refreshFeed()">Обновить радар 🔄</button>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); }

        const SUPABASE_URL = "https://cxelorovgbkpynpioohh.supabase.co";
        const SUPABASE_KEY = "sb_publishable_Ua8aV1G_PsMy8fOfhrXCuA_MQQNPoo9";

        let db = null;
        if (window.supabase) {
            db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } else {
            alert("Ошибка загрузки сети. Отключи VPN или блокировщик рекламы.");
        }

        let myId = tg?.initDataUnsafe?.user?.id || 77777; 
        let myName = tg?.initDataUnsafe?.user?.first_name || "Тестовый Юзер";
        let myLat = 0;
        let myLng = 0;
        
        let loadedUsers = [];
        let currentIndex = 0;

        // Переключатель экранов
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById(screenId).style.display = 'flex';
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        async function init() {
            if (!db) return;
            showScreen('screen-loading');
            document.getElementById('loading-text').innerText = "Запрашиваем GPS координаты... 📍";

            navigator.geolocation.getCurrentPosition(async (position) => {
                myLat = position.coords.latitude;
                myLng = position.coords.longitude;
                document.getElementById('loading-text').innerText = "Проверяем профиль... 🔐";

                try {
                    const { data: user, error } = await db.from('profiles').select('*').eq('id', myId).maybeSingle();
                    if (error) throw error;

                    if (!user) {
                        showScreen('screen-setup');
                    } else {
                        await db.from('profiles').update({ lat: myLat, lng: myLng }).eq('id', myId);
                        await loadFeed();
                    }
                } catch (err) {
                    alert("Ошибка базы данных: " + err.message);
                    showScreen('screen-empty');
                }
            }, () => {
                alert("Пожалуйста, включи GPS на устройстве, иначе радар не сможет рассчитать расстояние.");
                showScreen('screen-empty');
            });
        }

        async function saveProfile() {
            if (!db) return;
            const alcoholText = document.getElementById('alcoholInput').value || "Ищу компанию";
            const defaultAvatar = "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=500";

            showScreen('screen-loading');
            document.getElementById('loading-text').innerText = "Создаем профиль... 🚀";

            try {
                const { error } = await db.from('profiles').insert([
                    { id: myId, name: myName, alcohol: alcoholText, lat: myLat, lng: myLng, avatar_url: defaultAvatar }
                ]);
                if (error) throw error;

                await loadFeed();
            } catch (err) {
                alert("Не удалось сохранить профиль: " + err.message);
                showScreen('screen-setup');
            }
        }

        async function loadFeed() {
            if (!db) return;
            try {
                const { data: users, error } = await db.from('profiles').select('*').neq('id', myId);
                if (error) throw error;

                if (!users || users.length === 0) {
                    showScreen('screen-empty');
                    return;
                }

                loadedUsers = users.map(u => {
                    const dist = getDistance(myLat, myLng, u.lat, u.lng);
                    return { ...u, distanceInKm: dist };
                }).sort((a, b) => a.distanceInKm - b.distanceInKm);

                currentIndex = 0; // Сбрасываем индекс перед рендером
                renderFeed();
            } catch (err) {
                alert("Ошибка загрузки ленты: " + err.message);
                showScreen('screen-empty');
            }
        }

        function renderFeed() {
            const container = document.getElementById('cardContainer');
            container.innerHTML = '';
            
            if (loadedUsers.length === 0 || currentIndex >= loadedUsers.length) {
                showScreen('screen-empty');
                return;
            }

            // Рендерим карточки начиная с текущего индекса
            for (let i = loadedUsers.length - 1; i >= currentIndex; i--) {
                const user = loadedUsers[i];
                const card = document.createElement('div');
                card.className = 'card';
                card.id = `card-${i}`;
                card.style.zIndex = loadedUsers.length - i;

                const distStr = user.distanceInKm < 1 
                    ? `${Math.round(user.distanceInKm * 1000)} метров от тебя` 
                    : `${user.distanceInKm.toFixed(1)} км от тебя`;

                card.innerHTML = `
                    <div class="card-avatar" style="background-image: url('${user.avatar_url}')"></div>
                    <div class="card-info">
                        <div class="user-name">${user.name}</div>
                        <div class="user-distance">📍 ${distStr}</div>
                        <div class="user-alcohol">${user.alcohol}</div>
                    </div>
                `;
                container.appendChild(card);
            }
            showScreen('screen-feed');
        }

        async function refreshFeed() {
            showScreen('screen-loading');
            document.getElementById('loading-text').innerText = "Обновляем радар... 🔄";
            
            navigator.geolocation.getCurrentPosition(async (position) => {
                myLat = position.coords.latitude;
                myLng = position.coords.longitude;
                try {
                    await db.from('profiles').update({ lat: myLat, lng: myLng }).eq('id', myId);
                    await loadFeed();
                } catch (e) {
                    await loadFeed();
                }
            }, async () => {
                await loadFeed();
            });
        }

        async function swipe(action) {
            if (!db || currentIndex >= loadedUsers.length) return;

            const targetUser = loadedUsers[currentIndex];
            const currentCard = document.getElementById(`card-${currentIndex}`);
            
            if (action === 'toast') {
                if(currentCard) currentCard.style.transform = 'translateX(150vw) rotate(30deg)';
                
                await db.from('toasts').insert([{ from_user: myId, to_user: targetUser.id }]);

                const { data: match } = await db.from('toasts')
                    .select('*')
                    .eq('from_user', targetUser.id)
                    .eq('to_user', myId);

                if (match && match.length > 0) {
                    setTimeout(() => {
                        alert(`🍻 Взаимный тост с ${targetUser.name}! Напиши ему в TG: tg://user?id=${targetUser.id}`);
                    }, 400);
                }
            } else {
                if(currentCard) currentCard.style.transform = 'translateX(-150vw) rotate(-30deg)';
            }
            if(currentCard) currentCard.style.opacity = '0';

            currentIndex++;
            if (currentIndex >= loadedUsers.length) {
                setTimeout(() => {
                    showScreen('screen-empty');
                }, 300);
            }
        }

        init();
    </script>
</body>
</html>
